ServerRoot "/tmp/mobile-hub-apache"
PidFile "/tmp/mobile-hub-apache/apache.pid"
Listen 127.0.0.1:8081
ServerName localhost

LoadModule mpm_prefork_module /usr/lib/apache2/modules/mod_mpm_prefork.so
LoadModule authz_core_module /usr/lib/apache2/modules/mod_authz_core.so
LoadModule dir_module /usr/lib/apache2/modules/mod_dir.so
LoadModule mime_module /usr/lib/apache2/modules/mod_mime.so
LoadModule php_module /usr/lib/apache2/modules/libphp8.5.so

TypesConfig /etc/mime.types
DirectoryIndex index.php index.html
AddType application/x-httpd-php .php

DocumentRoot "/home/odilon/Téléchargements/mobile-hub"

<Directory "/home/odilon/Téléchargements/mobile-hub">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

ErrorLog "/tmp/mobile-hub-apache/error.log"
CustomLog "/tmp/mobile-hub-apache/access.log" combined
